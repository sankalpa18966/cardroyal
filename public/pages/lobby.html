<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardRoyal – Lobby</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .lobby-header { padding: 28px 32px 0; }
    .lobby-body   { padding: 24px 32px; }
    .rooms-grid   { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .room-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; transition: border-color var(--transition), transform var(--transition);
      cursor: pointer; position: relative; overflow: hidden;
    }
    .room-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold2)); opacity: 0; transition: opacity 0.2s;
    }
    .room-card:hover { border-color: rgba(245,200,66,0.3); transform: translateY(-2px); }
    .room-card:hover::before { opacity: 1; }
    .room-card-top  { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .room-name      { font-size: 1.05rem; font-weight: 700; }
    .room-code      { font-family: monospace; font-size: 0.85rem; color: var(--text2); background: var(--bg3); padding: 2px 8px; border-radius: 4px; }
    .room-meta      { display: flex; gap: 16px; }
    .room-meta span { font-size: 0.82rem; color: var(--text2); display: flex; align-items: center; gap: 4px; }
    .room-action    { margin-top: 14px; }
    .empty-state    { text-align: center; padding: 80px 20px; color: var(--text3); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: min(400px, 90vw); }
    .modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
    .points-pill { background: rgba(245,200,66,0.12); color: var(--gold); border-radius: 99px; padding: 4px 14px; font-size: 0.88rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <nav class="nav">
    <span class="nav-brand">🃏 CardRoyal</span>
    <div class="nav-right">
      <span class="points-pill" id="nav-points">🏆 — pts</span>
      <a href="/profile" class="nav-user" id="nav-user" style="text-decoration:none;cursor:pointer;" title="View Profile"></a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-content">
    <div class="lobby-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 style="font-size:1.5rem;font-weight:700;">Game Rooms</h2>
        <p style="color:var(--text2);font-size:0.9rem;margin-top:4px;">Join an existing room or create a new one</p>
      </div>
      <button class="btn btn-gold" id="create-btn" onclick="openCreate()">＋ Create Room</button>
    </div>

    <div class="lobby-body">
      <div id="rooms-container">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Create Room Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <h3>🎮 Create New Room</h3>
      <div class="alert alert-error" id="create-err"></div>
      <div class="form-group">
        <label for="room-name">Room Name</label>
        <input type="text" id="room-name" placeholder="My Awesome Room" maxlength="40">
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-gold btn-full" id="create-confirm-btn">Create</button>
        <button class="btn btn-ghost" onclick="closeCreate()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
